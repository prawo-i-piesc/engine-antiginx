name: Go Verification
run-name: >-
    ${{ 
        github.event_name == 'pull_request' 
        && format('Go Verification for CI: PR #{0} -> {1}', github.event.number, github.event.pull_request.title)
        ||
        github.event_name == 'push'
        && format('Go Verification for CI: Merge -> {0}', github.event.head_commit.message)
    }}

on:
    pull_request:
        types: [opened, synchronize, reopened]
    push:
        branches: [ "main" ]

permissions:
    contents: read

concurrency:
    group: ${{ github.event_name == 'pull_request' && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-ref-{1}', github.workflow, github.ref) }}
    cancel-in-progress: true

jobs:
    go-ci-test:
        name: Testing
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
        - name: 📥 Git -- Checkout repository
          uses: actions/checkout@v6

        - name: 📘 Go -- Set up
          uses: actions/setup-go@v6
          with:
            go-version-file: 'go.mod'
            cache: true

        - name: 🧪 Go -- Test Module Integrity
          run: |
            echo "⚙️ Verifying Go module integrity..."
            go mod tidy

            echo "|"
            echo "|"

            echo "⚙️ Checking for uncommitted changes in go.mod and go.sum:"
            if ! git diff --exit-code go.mod go.sum > /dev/null 2>&1 ; then
                git diff --color=always go.mod go.sum
                echo ""
                echo "❌ go.mod or go.sum have uncommitted changes. Please run 'go mod tidy' and commit the changes."
                exit 1
            else
                echo ""
                echo "✅ go.mod and go.sum are up to date."
            fi

        - name: 🧪 Go -- Test Compilation
          run: |
            echo "⚙️ Verifying project compilation..."
            if go build -v -o /dev/null ./...; then
                echo ""
                echo "✅ Compilation successful."
            else
                echo ""
                echo "❌ Compilation failed. Please fix the errors above."
                exit 1
            fi